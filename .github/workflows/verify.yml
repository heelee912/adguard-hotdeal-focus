name: Verify

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      dispatch_nonce:
        description: Machine correlation nonce
        required: false
        type: string

run-name: hotdeal-focus-verify-${{ inputs.dispatch_nonce || github.run_id }}

permissions: {}

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
    outputs:
      verified: ${{ steps.result.outputs.verified }}
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: npm

      - name: Install locked audit dependency
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Rebuild and verify immutable release contract
        id: contract
        shell: bash
        run: |
          set +e
          status=0
          npm run check:node || status=1
          npm test || status=1
          npm run build || status=1
          git diff --exit-code -- . || status=1
          git ls-files --error-unmatch \
            filter.txt \
            filter-static.txt \
            hotdeal-focus.user.js \
            release-manifest.json \
            tests/fixtures/dom-regressions.json \
            tests/fixtures/behavior-baseline.json >/dev/null || status=1
          npm run integrity || status=1
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Install Chromium for differential behavior fixtures
        if: steps.contract.outputs.status == '0'
        run: npx playwright install --with-deps chromium

      - name: Compare June/July behavior with the released allow-set
        if: steps.contract.outputs.status == '0'
        id: behavior
        shell: bash
        run: |
          set +e
          status=0
          timeout --kill-after=5s 60s npm run test:tamper || status=1
          if [[ "${status}" == "0" ]]; then
            timeout --kill-after=10s 15m npm run test:behavior || status=1
          fi
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Collect bounded SHA-256 and coverage evidence
        if: always()
        continue-on-error: true
        shell: bash
        run: |
          node scripts/candidate_queue.mjs collect-evidence \
            --source-dir outputs/evidence \
            --output-dir .audit-json-evidence \
            --max-files 512 \
            --max-bytes 8388608

      - name: Upload SHA-256 and coverage manifest
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: filter-integrity-${{ github.run_id }}
          path: .audit-json-evidence/
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 2

      - name: Stage immutable release draft
        if: >-
          steps.contract.outputs.status == '0' &&
          steps.behavior.outputs.status == '0'
        shell: bash
        run: |
          mkdir -p .release-draft
          node <<'NODE'
          const crypto = require('node:crypto');
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('release-manifest.json', 'utf8'));
          const expected = ['filter.txt', 'hotdeal-focus.user.js'];
          const actual = Object.keys(manifest.artifacts ?? {}).sort();
          if (JSON.stringify(actual) !== JSON.stringify(expected)) {
            throw new Error(`unexpected public artifacts: ${actual.join(', ')}`);
          }
          for (const name of expected) {
            const bytes = fs.readFileSync(name);
            const digest = crypto.createHash('sha256').update(bytes).digest('hex');
            if (manifest.artifacts[name]?.sha256 !== digest) {
              throw new Error(`${name} does not match release-manifest.json`);
            }
          }
          NODE
          install -m 0644 filter.txt .release-draft/filter.txt
          install -m 0644 hotdeal-focus.user.js .release-draft/hotdeal-focus.user.js
          install -m 0644 release-manifest.json .release-draft/release-manifest.json
          actual_files="$(find .release-draft -maxdepth 1 -type f -printf '%f\n' | sort)"
          expected_files="$(printf '%s\n' filter.txt hotdeal-focus.user.js release-manifest.json | sort)"
          if [[ "${actual_files}" != "${expected_files}" ]]; then
            echo "release draft contains a non-public fourth file" >&2
            exit 1
          fi

      - name: Upload immutable release draft
        if: >-
          steps.contract.outputs.status == '0' &&
          steps.behavior.outputs.status == '0'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-draft-${{ github.run_id }}
          path: .release-draft/
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

      - name: Publish verification result
        id: result
        shell: bash
        run: |
          if [[ "${{ steps.contract.outputs.status }}" == "0" && \
                "${{ steps.behavior.outputs.status }}" == "0" ]]; then
            echo "verified=true" >> "${GITHUB_OUTPUT}"
          else
            echo "verified=false" >> "${GITHUB_OUTPUT}"
            exit 1
          fi

  publish-pages:
    needs: verify
    if: >-
      needs.verify.outputs.verified == 'true' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref_name == github.event.repository.default_branch &&
      vars.ENABLE_PAGES_PUBLISH == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    concurrency:
      group: hotdeal-focus-pages-deployment
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Download the exact verified release draft
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-draft-${{ github.run_id }}
          path: .pages

      - name: Check out the exact verified source for gate attestation
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          path: .verified-source
          persist-credentials: false

      - name: Refuse to publish a verified commit older than the default branch head
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          VERIFIED_SHA: ${{ github.sha }}
        shell: bash
        run: |
          authenticated="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          remote_sha="$(git ls-remote "${authenticated}" "refs/heads/${DEFAULT_BRANCH}" | cut -f1)"
          if [[ -z "${VERIFIED_SHA}" || "${remote_sha}" != "${VERIFIED_SHA}" ]]; then
            echo "The default branch changed after verification; Pages publication is deferred." >&2
            exit 1
          fi

      - name: Require the exact immutable gate release before Pages publication
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: .verified-source
        shell: bash
        run: |
          python scripts/hotdeal_focus_cli.py gate-release verify \
            --repo "${GITHUB_REPOSITORY}" \
            --json > ../.gate-release-verification.json

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: .pages

      - name: Deploy verified files to Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
